<a [routerLink]="['/projects', project.slug]"
   class="group block rounded-2xl overflow-hidden border border-white/10 hover:border-ot-purple/50 transition-all duration-300 hover:scale-[1.02] hover:shadow-[0_0_50px_rgba(155,93,229,0.18)] cursor-pointer"
   [style.background]="project.gradient">

  <div class="p-6 sm:p-8 flex flex-col gap-4 h-full">

    <!-- Icon + eyebrow + name -->
    <div class="flex items-center gap-4">
      <div class="w-16 h-16 rounded-2xl overflow-hidden flex-shrink-0 shadow-[0_0_28px_rgba(110,50,200,0.45)]">
        <img [src]="project.icon" [alt]="project.name + ' icon'" class="w-full h-full object-cover" />
      </div>
      <div>
        <p class="text-[10px] font-outfit font-semibold tracking-[0.2em] uppercase mb-1 flex items-center gap-2"
           [style.color]="project.accentColor">
          <span class="inline-block w-3.5 h-px" [style.background]="project.accentColor"></span>
          {{ project.eyebrow }}
        </p>
        <h3 class="font-cinzel text-2xl font-black leading-none bg-gradient-to-br from-[#e8d0ff] via-[#b880ff] to-[#7a3fc0] bg-clip-text text-transparent">
          {{ project.name }}
        </h3>
      </div>
    </div>

    <!-- Tagline -->
    <p class="text-white/35 text-xs font-outfit font-light tracking-[0.1em] uppercase">
      {{ project.tagline }}
    </p>

    <!-- Description -->
    <p class="text-white/55 text-sm font-outfit leading-relaxed">
      {{ project.description }}
    </p>

    <!-- Pills -->
    <div class="flex flex-wrap gap-2 mt-auto pt-2">
      @for (pill of project.pills; track pill) {
        <span class="flex items-center gap-1.5 px-3 py-1 rounded-full border border-ot-purple/30 bg-ot-purple/10 text-[11px] font-outfit font-medium text-ot-purple-light/80">
          <span class="w-1 h-1 rounded-full bg-ot-purple-light/60 flex-shrink-0"></span>
          {{ pill }}
        </span>
      }
    </div>

    <!-- CTA arrow -->
    <div class="flex justify-end mt-1">
      <span class="text-xs font-outfit font-medium transition-all flex items-center gap-1 group-hover:gap-2"
            [style.color]="project.accentColor + '99'">
        View Project
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      </span>
    </div>

  </div>
</a>
